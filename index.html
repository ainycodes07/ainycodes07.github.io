<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Qurat Ul Ain</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Google Sans Flex Alternative -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- LOADER -->
  <div class="loader" id="loader">

    <div class="loader-logo-wrap">

      <img src="images/3.png" alt="" class="loader-logo dark-loader-logo">

      <img src="images/6.png" alt="" class="loader-logo light-loader-logo">

    </div>

  </div>

  <!-- HEADER -->
  <header class="header">

    <!-- LEFT -->
    <div class="header-left">

      <img src="images/3.png" alt="Dark Logo" class="header-logo dark-logo">
      <img src="images/6.png" alt="Light Logo" class="header-logo light-logo">

      <!-- TOGGLE -->
      <button class="theme-toggle" id="themeToggle">

        <div class="toggle-circle"></div>

      </button>

    </div>

    <!-- CENTER -->
    <div class="header-center">

      <h1>Qurat Ul Ain</h1>
      <p>Web Developer</p>

    </div>

    <!-- RIGHT -->
    <div class="header-right">

      <button class="menu-btn" id="menuBtn">

        <span></span>
        <span></span>

      </button>

    </div>

  </header>


  <!-- HERO SLIDER -->

  <section class="hero">

    <div class="slider">

      <!-- SLIDES -->

      <div class="slide active" data-link="project-detail-1.html">
        <img src="images/project1.png" alt="">
      </div>

      <div class="slide" data-link="project-detail-1.html">
        <img src="images/project2.png" alt="">
      </div>

      <div class="slide" data-link="project-detail-1.html">
        <img src="images/project3.png" alt="">
      </div>
<div class="slide" data-link="project-detail-1.html">
  <img src="images/project4.png" alt="">
</div>

      <div class="slide" data-link="project-detail-1.html">
        <img src="images/project5.png" alt="">
      </div>

      <!-- BUTTONS -->

      <button class="slider-btn prev" id="prevBtn">
        &#10094;
      </button>

      <button class="slider-btn next" id="nextBtn">
        &#10095;
      </button>

      <!-- DOTS -->

      <div class="slider-dots" id="sliderDots">

        <button class="dot active"></button>
        <button class="dot"></button>
        <button class="dot"></button>
        <button class="dot"></button>
        <button class="dot"></button>

      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <footer class="footer">

    <!-- LEFT -->

    <div class="footer-left">

      <!-- DESKTOP ICONS -->

      <div class="social-icons desktop-socials">

        <a href="#">
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>

        <a href="#">
          <i class="fa-brands fa-github"></i>
        </a>

        <a href="#">
          <i class="fa-solid fa-bag-shopping"></i>
        </a>

      </div>

      <!-- MOBILE MENU -->

      <div class="mobile-social-wrapper">

        <button class="mobile-social-btn" id="mobileSocialBtn">

          <i class="fa-solid fa-link"></i>

        </button>

        <div class="mobile-social-menu" id="mobileSocialMenu">


          <a href="#">
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a href="#">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>

          <a href="#">
            <i class="fa-brands fa-github"></i>
          </a>

          <a href="#">
            <i class="fa-solid fa-bag-shopping"></i>
          </a>

      </button>

        <a href="#">Accessibility Statement</a>
        <a href="#">Site Instructions</a>
        <a href="#">Privacy Policy</a>

      </div>

    </div>

    <!-- RIGHT -->

    <div class="footer-right">

      <p>
        © 2026 Qurat Ul Ain. All rights reserved.
      </p>

    </div>

  </footer>

  <!-- FULLSCREEN MENU -->
  <div class="fullscreen-menu" id="fullscreenMenu">

    <nav>

      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>

    </nav>

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
